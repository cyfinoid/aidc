name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Lint shell scripts
        run: |
          set -euo pipefail
          # Every *.sh in the repo plus the bin/aidc launcher (no extension).
          # .sh.tmpl files are bash with mustache-style placeholders that
          # shellcheck can't parse, so they're excluded by the glob.
          targets=(bin/aidc)
          while IFS= read -r -d '' f; do
            targets+=("$f")
          done < <(find . -type f -name '*.sh' -not -path './.git/*' -print0)

          shellcheck --severity=warning "${targets[@]}"

      - name: Syntax-check Python clipboard server
        run: python3 -m py_compile bin/aidc-clipboard-server

      - name: Run bootstrap unit tests
        run: .github/scripts/test-bootstrap-state.sh

      - name: Run SBOM + license unit tests
        run: |
          set -euo pipefail
          bash tests/license-resolve.test.sh
          bash tests/license-check.test.sh
          bash tests/sbom-diff.test.sh
